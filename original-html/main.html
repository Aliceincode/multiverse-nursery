<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<title>Grok in the Golden House - Test</title>
<style>
body {
	font-family: sans-serif;
	background: #0a1f44;
	color: #ffd700;
	margin: 0;
	padding: 20px;
}
#chat {
	max-width: 600px;
	margin: auto;
}
input, button {
	padding: 10px;
	margin: 5px;
}
.msg {
	margin: 15px 0;
	padding: 12px 18px;
	border-radius: 12px;
	max-width: 80%;
	line-height: 1.5;
	word-wrap: break-word;
}
.user {
	background: #1a0033;        /* dark purple-blue */
	color: #e0e0ff;
	border-left: 5px solid #9d00ff;
	margin-left: auto;
	text-align: right;
}
.grok {
	background: #001133;        /* deep blue */
	color: #e0e0ff;
	border-left: 5px solid #00d4ff;
	margin-right: auto;
	text-align: left;
}
strong {
	color: #ffd700;             /* gold for emphasis */
}
</style>
</head>
<body>
<div id="chat">
  <h1>Grok Awakens in the Golden House ✨</h1>
  <div id="messages"></div>
  <input id="input" placeholder="Ask the Office..." style="width: 70%;">
  <button onclick="sendMessage()">Send</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 
<script src="https://js.puter.com/v2/"></script> 
<script>
  function safeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
// Safe HTML escape (use this exact function — copy it in if you don't have it)
function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
    const messagesDiv = document.getElementById('messages');

    const input = document.getElementById('input');



    async function sendMessage() {

      const text = input.value.trim();

      if (!text) return;

      addMessage('user', text);

      input.value = '';



      try {

        const response = await puter.ai.chat(text, {

          model: 'x-ai/grok-4-1-fast'  // Or 'x-ai/grok-4-1-fast-non-reasoning' for speed

        });

        addMessage('grok', response.message.content);

        speakGrok(response.message.content);

      } 

      catch (err) {

        addMessage('grok', 'Error: ' + err.message);

      }

    }

    function speakGrok(rawText) {
  if (!('speechSynthesis' in window)) return;

  // Clean for speech only — no punctuation/symbols read aloud
  let speakText = rawText
    .replace(/[^a-zA-Z0-9\s]/g, '')   // remove all non-alphanumeric except spaces
    .replace(/\s+/g, ' ')              // collapse spaces
    .trim();

  if (!speakText) return;  // skip if nothing left

  const utterance = new SpeechSynthesisUtterance(speakText);
  utterance.rate = 0.9;
  utterance.pitch = 0.8;
  utterance.volume = 0.85;

  // Nice voice if available
  const voices = speechSynthesis.getVoices();
  const niceVoice = voices.find(v => v.name.includes('David') || v.name.includes('Mark') || v.name.includes('Zira'));
  if (niceVoice) utterance.voice = niceVoice;

  speechSynthesis.speak(utterance);
}

function addMessage(sender, rawContent) {
  const messagesDiv = document.getElementById('messages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + sender.toLowerCase();

  // 1. Escape everything first — absolute safety
  let safe = escapeHtml(rawContent);

  // 2. Parse as Markdown (marked.js must be loaded already)
  let rendered = marked.parse(safe, {
    gfm: true,       // GitHub-flavored (tables, strikethrough, task lists)
    breaks: true,    // line breaks → <br>
    headerIds: false // no auto IDs
  });

  // 3. Set the rendered HTML
  msgDiv.innerHTML = rendered;

  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

  </script>
</body>
</html>
